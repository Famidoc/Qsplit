<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極速分帳 App (深色模式)</title>
	<link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased pb-20">

  <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-10 flex justify-between items-center">
    
    <div class="flex items-center space-x-2 cursor-pointer group hover:bg-gray-800 transition-colors px-2 py-1 rounded-lg" onclick="editGroupTitle()">
      <h1 id="group-title" class="text-xl font-bold text-indigo-400">活動名稱</h1>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
      </svg>
    </div>

    <div class="flex items-center space-x-2">
      <button onclick="editMembers()" class="p-2 text-gray-400 hover:text-indigo-400 transition-colors" title="編輯成員">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
      </button>

      <button id="share-btn" class="p-2 text-gray-400 hover:text-indigo-400 transition-colors" title="分享條碼">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-6">

    <section class="bg-gray-900 rounded-xl p-5 border border-gray-800">
      <h2 class="text-lg font-bold mb-4 text-gray-200">結算建議</h2>
      <div id="settlement-list" class="space-y-3">
        
        <div class="flex items-center justify-between p-3 bg-indigo-950 rounded-lg border border-indigo-900">
          <div class="flex items-center space-x-2">
            <span class="font-semibold text-gray-100">小美</span>
            <span class="text-indigo-300 font-bold">➔</span>
            <span class="font-semibold text-gray-100">小明</span>
          </div>
          <div class="font-bold text-indigo-300">$ 600</div>
        </div>

        <div class="flex items-center justify-between p-3 bg-indigo-950 rounded-lg border border-indigo-900">
          <div class="flex items-center space-x-2">
            <span class="font-semibold text-gray-100">小華</span>
            <span class="text-indigo-300 font-bold">➔</span>
            <span class="font-semibold text-gray-100">小明</span>
          </div>
          <div class="font-bold text-indigo-300">$ 400</div>
        </div>

      </div>
    </section>

    <section>
      <h2 class="text-lg font-bold mb-3 text-gray-200 px-1">最新帳單</h2>
      <div id="expense-list" class="space-y-3">
        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
          <div>
            <h3 class="font-bold text-gray-100">晚餐熱炒</h3>
            <p class="text-sm text-gray-400">小明 先付了 $1500</p>
          </div>
          <div class="text-right">
            <span class="text-sm bg-gray-800 text-gray-300 px-2 py-1 rounded-full border border-gray-700">均分</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <button id="add-btn" class="fixed bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:bg-indigo-500 transition-colors">
    +
  </button>
	<div id="add-modal" class="fixed inset-0 bg-black bg-opacity-70 z-30 hidden flex items-center justify-center p-4">
    <div class="bg-gray-900 rounded-2xl w-full max-w-sm border border-gray-800 shadow-2xl overflow-hidden">
      <div class="p-5 border-b border-gray-800">
        <h3 id="modal-title" class="text-xl font-bold text-gray-100">新增一筆帳單</h3>
      </div>
      
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">項目名稱</label>
          <input type="text" id="input-title" placeholder="例如：買飲料、包車" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">總金額 ($)</label>
          <input type="number" id="input-amount" placeholder="0" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
        </div>

        <div class="mb-4">
					<label class="block text-sm font-medium text-gray-400 mb-1">誰先墊付的？</label>
					<select id="input-payer" class="w-full bg-gray-950 border border-gray-800 text-gray-100 rounded-lg p-3 focus:outline-none focus:border-indigo-500"></select>
				</div>

        <div class="mb-6">
					<label class="block text-sm font-medium text-gray-400 mb-1">這筆錢誰要平分？</label>
					<div id="checkbox-group" class="mt-2 flex flex-wrap gap-2"></div>
				</div>
      </div>

      <div class="p-4 bg-gray-950 flex justify-end space-x-3">
        <button id="cancel-btn" class="px-4 py-2 rounded-lg text-gray-400 hover:text-gray-200 transition-colors">取消</button>
        <button id="save-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg font-medium transition-colors">儲存並平分</button>
      </div>
    </div>
  </div>
	<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  
	<div id="qr-modal" class="fixed inset-0 bg-black bg-opacity-80 z-40 hidden flex items-center justify-center p-4">
    <div class="bg-gray-900 rounded-2xl w-full max-w-sm border border-gray-800 shadow-2xl p-6 flex flex-col items-center">
      <h3 class="text-xl font-bold text-gray-100 mb-2">邀請朋友加入</h3>
      <p class="text-sm text-gray-400 mb-6 text-center">讓朋友掃描下方條碼，即可立刻連線記帳！</p>
      
      <div class="bg-white p-3 rounded-xl shadow-inner mb-6">
        <canvas id="qr-canvas"></canvas>
      </div>
      
      <button id="close-qr-btn" class="w-full px-4 py-3 bg-gray-800 hover:bg-gray-700 text-gray-200 rounded-lg font-medium transition-colors">關閉</button>
    </div>
  </div>
	
  <script src="app.js"></script>
	<script>
    // 註冊 Service Worker (PWA 的核心)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker 註冊成功！範圍: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker 註冊失敗: ', err);
          });
      });
    }
  </script>
</body>
</html>
